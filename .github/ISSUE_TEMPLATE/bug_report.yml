name: "Bug Report"
description: "Report a bug in OpenJournal"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thank you for reporting a bug! Please fill out the details below."
  - type: input
    id: version
    attributes:
      label: "OpenJournal Version"
      description: "What version of OpenJournal are you running?"
      placeholder: "v0.1.3"
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: "Windows Version"
      description: "Windows 10 or Windows 11?"
      placeholder: "Windows 11 23H2"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "How can we reproduce this bug?"
      placeholder: "1. Open OpenJournal\n2. Click 'Export Markdown'\n3. See error..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "What did you expect to happen?"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      description: "What actually happened?"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "Logs or Screenshots"
      description: "Any error messages, console output, or screenshots."
